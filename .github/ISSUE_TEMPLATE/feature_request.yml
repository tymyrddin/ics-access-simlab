name: Feature Request
description: Suggest a new device, protocol, zone, scenario, or CTF attack path
title: "[FEATURE]: "
labels: ["enhancement", "needs-discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Proposing new features? Excellent. Be specific about what you want and why it matters.

        *"Ideas are cheap. Docker files are valuable."*

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What type of feature are you proposing?
      options:
        - New device or container (PLC, RTU, HMI, historian, gateway, etc.)
        - Protocol support (Modbus, IEC 104, OPC UA, DNP3, IEC 61850, etc.)
        - New CTF scenario or zone
        - Vulnerability simulation (attack surface, misconfiguration, weak credential, etc.)
        - Network topology change (routing, firewall rules, segmentation)
        - Documentation or examples
        - Other (explain in description)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What security research or training need does this address?
      placeholder: "Currently no way to practice IEC 61850 GOOSE spoofing because the bay controller does not simulate it..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What specifically needs to be implemented?
      placeholder: |
        Add IEC 61850 support to uupl-bay-ctrl (10.10.3.34):
        - Use stinging/61850-sim base image
        - Wire into ics_control network
        - Expose GOOSE and MMS on appropriate ports
        - Document attack path in scenario notes
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Approaches
      description: Are there other ways to solve this problem?
      placeholder: "Could extend the existing relay containers rather than adding a dedicated bay controller..."

  - type: textarea
    id: research
    attributes:
      label: Security Research Value
      description: How would this improve ICS security research or CTF training?
      placeholder: "IEC 61850 is common in substations. Adding it lets defenders practise detection of GOOSE replay attacks..."
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Notes
      description: Technical details, architecture considerations, or known challenges
      placeholder: |
        - Needs stinging/61850-sim evaluated (done, noted in docs/PLAN.md)
        - IP already reserved at 10.10.3.34
        - Requires adding to ctf-config.yaml and regenerating compose

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to documentation, protocol specs, or similar implementations
      placeholder: |
        - stinging/61850-sim: [link]
        - IEC 61850 attack research: [link]

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated Complexity
      description: How difficult is this to implement?
      options:
        - Simple (a few hours, one container or config change)
        - Moderate (a few days, one zone or subsystem)
        - Complex (weeks, multiple zones or protocol work)
        - Major (months, architectural changes)
        - Unknown (needs investigation)
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution Intent
      options:
        - label: I am willing to implement this with guidance
        - label: I can provide technical specifications or documentation
        - label: I can help test this once implemented
        - label: I am requesting this but cannot contribute implementation

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else relevant? Use cases, deployment scenarios, related features?