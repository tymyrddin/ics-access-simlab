; stunnel client — control SCADA Modbus-TLS connector
;
; Control Scada-LTS Modbus data source: 127.0.0.1:5020
; Traffic: Scada-LTS → localhost:5020 → [TLS/mTLS] → GATEWAY_HOST:8502 → PLC:502
;
; Connects to the stunnel gateway on the control network (10.10.3.50).
; Server cert not verified — HEX-4421 (cert renewal overdue, risk accepted).

pid = /run/stunnel-ctrl-client.pid
foreground = no

[modbus-tls-client]
client  = yes
accept  = 127.0.0.1:5020
connect = GATEWAY_HOST:8502

cert    = /run/stunnel-certs/client.crt
key     = /run/stunnel-certs/client.key
verify  = 0
