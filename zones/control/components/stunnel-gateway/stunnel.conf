; stunnel configuration — UUPL Modbus TLS Gateway
; Deployed: 2015-03-14  Reviewed: 2019-11-08  Cert renewal: OVERDUE (HEX-4421 WONT-FIX)
;
; This gateway terminates TLS from the SCADA system and forwards plain Modbus
; to the turbine PLC. Network isolation is the primary access control beyond TLS.
;
; TLS version: pinned to TLSv1 — upgrading to TLSv1.2 broke compatibility with
; the SCADA client library in use (ticket HEX-3887, 2019). Revisit in next outage window.

pid = /run/stunnel.pid
foreground = yes

[modbus-tls]
accept  = 0.0.0.0:8502
connect = FORWARD_TARGET

; Server identity — certs mounted from /run/stunnel/
cert    = /run/stunnel/server.crt
key     = /run/stunnel/server.key

; Require client certificate — only the SCADA system should connect here.
verify  = 2
CAfile  = /run/stunnel/ca.crt

; Weak TLS version — left as-is since 2019 maintenance freeze.
sslVersion = TLSv1
