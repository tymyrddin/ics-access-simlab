# Simple NTP client config for DMZ host
# Points to the local NTP server for time sync

server 10.10.5.30 iburst

# Basic drift file
driftfile /var/lib/ntp/ntp.drift

# Security
restrict default kod nomodify notrap nopeer noquery
restrict 127.0.0.1
restrict ::1
restrict 10.10.5.30 nomodify notrap nopeer noquery