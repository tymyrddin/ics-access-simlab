options {
    directory "/var/cache/bind";
    allow-query { any; };
    allow-recursion { any; };
    recursion yes;
    dnssec-validation no;
    listen-on { any; };
    listen-on-v6 { none; };
    forwarders { 8.8.8.8; 8.8.4.4; };
    // Vendor-default identification leak. version.bind CHAOS TXT is on by
    // default; server-id matches the same posture (a real misconfigured BIND
    // exposes both) and lets the runbook's id.server query return a value.
    version "9.20.22";
    server-id "city-directory";
};

// Authoritative zone for the UU P&L internal namespace. The lab's DMZ has no
// outbound NAT (realistic OT site), so external recursion does not actually
// reach 8.8.8.8. Internal queries against uupl.am still resolve here, which
// is what the runbook's recon and cache-poisoning stages actually target.
//
// allow-transfer { any; }: zone transfer is wide open to match the rest of
// the wide-open BIND posture (allow-recursion any, allow-query any,
// dnssec-validation no). Lets the runbook's `dig uupl.am AXFR` recon step
// actually return the zone instead of "Transfer failed".
zone "uupl.am" {
    type master;
    file "/etc/bind/uupl.am.zone";
    allow-transfer { any; };
};
