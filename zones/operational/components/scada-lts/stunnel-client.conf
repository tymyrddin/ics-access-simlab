; stunnel client — UUPL SCADA Modbus-TLS connector
;
; Scada-LTS Modbus data source: 127.0.0.1:5020
; Traffic: Scada-LTS → localhost:5020 → [TLS/mTLS] → GATEWAY_HOST:8502 → PLC:502
;
; Server cert verification disabled (verify=0): gateway cert expired and renewal
; was not completed before operational freeze. Risk accepted, ticket HEX-4421.

pid = /run/stunnel-client.pid
foreground = no

[modbus-tls-client]
client  = yes
accept  = 127.0.0.1:5020
connect = GATEWAY_HOST:8502

; Client cert — authenticates this SCADA system to the gateway.
; Certs mounted from /run/stunnel-certs/ (volume mount).
cert    = /run/stunnel-certs/client.crt
key     = /run/stunnel-certs/client.key

; Server cert not verified — see HEX-4421 note.
verify  = 0
