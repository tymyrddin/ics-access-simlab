# UU P&L dmz zone, structural clab edition.
#
# Three Linux bridges enter this topology: ics_dmz (the zone's own),
# ics_internet (for inet-dmz-fw's other side), and ics_enterprise (for
# dmz-ent-fw and the dual-homed contractors-gate). Same kind: bridge name
# means the same Linux bridge on the host, shared with other topologies.

name: uupl-dmz
prefix: ""

topology:

  defaults:
    kind: linux
    # See clab/control-zone.clab.yaml for the why; strips the mgmt-IP
    # from eth0 so hostname -I returns only in-simulation addresses.
    exec:
      - sh -c "ip addr flush dev eth0 2>/dev/null || true"

  nodes:

    ics_dmz:        { kind: bridge }
    ics_internet:   { kind: bridge }
    ics_enterprise: { kind: bridge }

    # ── L3 boundaries ───────────────────────────────────────────────────
    inet-dmz-fw:
      image: clab-router
      binds:
        - frr/daemons:/etc/frr/daemons
        - frr/inet-dmz-fw.frr.conf:/etc/frr/frr.conf
        - ../infrastructure/routers/generated/inet-dmz-fw-acl.sh:/acl.sh
      labels:
        role: gateway

    dmz-ent-fw:
      image: clab-router
      binds:
        - frr/daemons:/etc/frr/daemons
        - frr/dmz-ent-fw.frr.conf:/etc/frr/frr.conf
        - ../infrastructure/routers/generated/dmz-ent-fw-acl.sh:/acl.sh
      labels:
        role: gateway

    # ── DMZ services ────────────────────────────────────────────────────
    guild-exchange:
      image: dmz-guild-exchange
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.5.10/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.5.201"

    sorting-office:
      image: dmz-sorting-office
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.5.11/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.5.201"

    clacks-relay:
      image: dmz-clacks-relay
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.5.12/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.5.201"

    guild-register:
      image: dmz-guild-register
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.5.13/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.5.201"

    substation-rtu:
      image: dmz-substation-rtu
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.5.14/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.5.201"

    # contractors-gate is dual-homed dmz + enterprise. eth1 = dmz, eth2 = enterprise.
    contractors-gate:
      image: dmz-contractors-gate
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.5.20/24 dev eth1 && ip link set eth1 up"
        - sh -c "n=0; until ip link show eth2 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.1.30/24 dev eth2 && ip link set eth2 up"
        - sh -c "ip route replace default via 10.10.5.201"

    dispatch-box:
      image: dmz-dispatch-box
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.5.21/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.5.201"

    guild-clock:
      image: dmz-guild-clock
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.5.30/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.5.201"

    city-directory:
      image: dmz-city-directory
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.5.31/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.5.201"

    scribes-post:
      image: dmz-scribes-post
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.5.32/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.5.201"

  # Per-topology prefix `vd*` for globally unique veth names.
  links:
    - endpoints: [inet-dmz-fw:eth1, ics_dmz:vd0]
    - endpoints: [inet-dmz-fw:eth2, ics_internet:vd1]
    - endpoints: [dmz-ent-fw:eth1,  ics_dmz:vd2]
    - endpoints: [dmz-ent-fw:eth2,  ics_enterprise:vd3]

    - endpoints: [guild-exchange:eth1,  ics_dmz:vd4]
    - endpoints: [sorting-office:eth1, ics_dmz:vd5]
    - endpoints: [clacks-relay:eth1,       ics_dmz:vd6]
    - endpoints: [guild-register:eth1,   ics_dmz:vd7]
    - endpoints: [substation-rtu:eth1,     ics_dmz:vd8]
    - endpoints: [contractors-gate:eth1,    ics_dmz:vd9]
    - endpoints: [dispatch-box:eth1,      ics_dmz:vd10]
    - endpoints: [guild-clock:eth1,     ics_dmz:vd11]
    - endpoints: [city-directory:eth1,  ics_dmz:vd12]
    - endpoints: [scribes-post:eth1,   ics_dmz:vd13]

    - endpoints: [contractors-gate:eth2, ics_enterprise:vd14]
