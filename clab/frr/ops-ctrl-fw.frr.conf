! UU P&L ops-ctrl-fw, control/operational L3 boundary.
!
! eth0 = ics_control (mgmt-ipv4 10.10.3.203), eth1 = ics_operational
! (post-deploy attach 10.10.2.203). Packet-filter policy comes from
! /acl.sh, applied by clab/frr/start.sh.

frr defaults traditional
hostname ops-ctrl-fw
service password-encryption
no ip forwarding
ip forwarding
!
interface eth0
 description ics_control 10.10.3.0/24 (eth0 = mgmt-ipv4 10.10.3.203)
 ip address 10.10.3.203/24
exit
!
interface eth1
 description ics_operational 10.10.2.0/24 (post-deploy attach 10.10.2.203)
 ip address 10.10.2.203/24
exit
!
! Static routes via ent-ops-fw (10.10.2.202) for non-adjacent zones, and
! ops-wan-router (10.10.2.204) for the wan substations bridge.
ip route 10.10.0.0/24 10.10.2.202
ip route 10.10.1.0/24 10.10.2.202
ip route 10.10.4.0/24 10.10.2.204
ip route 10.10.5.0/24 10.10.2.202
!
enable password uupl-router
!
end
