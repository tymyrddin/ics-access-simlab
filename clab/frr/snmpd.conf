# UU P&L FRR router SNMP configuration.
#
# Vendor-default communities, never changed since commissioning. Visitors
# who run snmpwalk -c public against any gateway IP discover the entire
# system view. Visitors who guess private get write access to sysContact /
# sysLocation / sysName and can flip ifAdminStatus on a port, the textbook
# OT SNMP misconfiguration.

# Listen on all interfaces, UDP port 161.
agentAddress udp:0.0.0.0:161

# Read-only and read-write communities, no ACL: every source is permitted.
rocommunity public  default
rwcommunity private default

# System information visible in sysDescr / sysContact / sysLocation /
# sysName via the standard system-mib OIDs.
sysLocation    "UU P&L Faculty of Distribution, Substation Room 3"
sysContact     "ridcully@uupl.am"
sysName        "uupl-fw"
sysServices    72
sysDescr       "UU P&L inter-zone router, vendor stock firmware"
