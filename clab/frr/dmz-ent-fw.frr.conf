! UU P&L dmz-ent-fw, dmz/enterprise L3 boundary.
!
! eth0 = clab out-of-band mgmt. eth1 = ics_dmz, eth2 = ics_enterprise.
! Conntrack-symmetric router for the dmz: both internet↔dmz and
! enterprise↔dmz traffic transits here.

frr defaults traditional
hostname dmz-ent-fw
service password-encryption
no ip forwarding
ip forwarding
!
interface eth1
 description ics_dmz 10.10.5.0/24
 ip address 10.10.5.201/24
 ip ospf network non-broadcast
exit
!
interface eth2
 description ics_enterprise 10.10.1.0/24
 ip address 10.10.1.201/24
 ip ospf network non-broadcast
exit
!
! Internet via inet-dmz-fw on the dmz side; operational + control via
! ent-ops-fw on the enterprise side.
ip route 10.10.0.0/24 10.10.5.200
ip route 10.10.2.0/24 10.10.1.202
ip route 10.10.3.0/24 10.10.1.202
ip route 10.10.4.0/24 10.10.1.202
!
router ospf
 ospf router-id 2.2.2.2
 network 10.10.1.0/24 area 0
 network 10.10.5.0/24 area 0
 neighbor 10.10.5.200
 neighbor 10.10.1.202
exit
!
enable password uupl-router
!
end
