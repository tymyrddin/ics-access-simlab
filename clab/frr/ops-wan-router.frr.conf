! UU P&L ops-wan-router, operational/wan L3 boundary.
!
! eth0 = clab out-of-band mgmt. eth1 = ics_operational, eth2 = ics_wan.
! WAN zone has no services yet (zones/field-devices/ is a placeholder);
! the router still does the boundary job.

frr defaults traditional
hostname ops-wan-router
service password-encryption
no ip forwarding
ip forwarding
!
interface eth1
 description ics_operational 10.10.2.0/24
 ip address 10.10.2.204/24
exit
!
interface eth2
 description ics_wan 10.10.4.0/24
 ip address 10.10.4.204/24
exit
!
enable password uupl-router
!
end
