! UU P&L inet-dmz-fw, internet/dmz L3 boundary.
!
! eth0 = clab out-of-band mgmt. eth1 = ics_dmz, eth2 = ics_internet.
! Conntrack symmetry: all DMZ-bound traffic forwarded through dmz-ent-fw
! so one router sees both directions.

frr defaults traditional
hostname inet-dmz-fw
service password-encryption
no ip forwarding
ip forwarding
!
interface eth1
 description ics_dmz 10.10.5.0/24
 ip address 10.10.5.200/24
exit
!
interface eth2
 description ics_internet 10.10.0.0/24
 ip address 10.10.0.200/24
exit
!
! Force conntrack symmetry: traffic for ics_dmz transits via dmz-ent-fw.
ip route 10.10.5.0/24 10.10.5.201
!
! Non-adjacent zones reachable through the DMZ chain.
ip route 10.10.1.0/24 10.10.5.201
ip route 10.10.2.0/24 10.10.5.201
ip route 10.10.3.0/24 10.10.5.201
!
enable password uupl-router
!
end
