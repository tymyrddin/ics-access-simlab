! UU P&L inet-dmz-fw, internet/dmz L3 boundary.
!
! eth0 = clab out-of-band mgmt. eth1 = ics_dmz, eth2 = ics_internet.
! Conntrack symmetry: all DMZ-bound traffic forwarded through dmz-ent-fw
! so one router sees both directions.

frr defaults traditional
hostname inet-dmz-fw
service password-encryption
no ip forwarding
ip forwarding
!
interface eth1
 description ics_dmz 10.10.5.0/24
 ip address 10.10.5.200/24
 ip ospf network non-broadcast
exit
!
interface eth2
 description ics_internet 10.10.0.0/24
 ip address 10.10.0.200/24
 ip ospf network non-broadcast
exit
!
! Force conntrack symmetry: traffic for ics_dmz transits via dmz-ent-fw.
ip route 10.10.5.0/24 10.10.5.201
!
! Non-adjacent zones reachable through the DMZ chain.
ip route 10.10.1.0/24 10.10.5.201
ip route 10.10.2.0/24 10.10.5.201
ip route 10.10.3.0/24 10.10.5.201
!
! OSPF area 0, no auth, no passive-interface. Interfaces are NBMA so
! Hellos go unicast to explicit neighbours (the kind:bridge fabric's
! link-local multicast doesn't flood reliably). Realistic for OT WANs
! commissioned over hub-and-spoke topologies. Static routes above keep
! their admin-distance precedence; OSPF runs as a parallel learning plane
! that the lab uses to expose routing-protocol misconfig as attack surface.
router ospf
 ospf router-id 1.1.1.1
 network 10.10.0.0/24 area 0
 network 10.10.5.0/24 area 0
 neighbor 10.10.5.201
exit
!
! iBGP toward dmz-ent-fw across ics_dmz. No password, no prefix-list, no
! max-prefix: vendor-default trust between site routers. The visitor's
! attack is to `redistribute static` from a compromised peer and inject
! routes the rest of the AS accepts without question.
router bgp 65000
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 neighbor 10.10.5.201 remote-as 65000
 address-family ipv4 unicast
  neighbor 10.10.5.201 activate
 exit-address-family
exit
!
enable password uupl-router
!
end
