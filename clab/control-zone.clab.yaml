# UU P&L control zone, structural clab edition.
#
# ics_control and ics_operational are real Linux bridges on the host
# (kind: bridge). Containers attach to them via explicit veth links.
# ops-ctrl-fw is the L3 boundary, with FRR holding the routing table and
# iptables enforcing the forwarding-policy ACL from /acl.sh. Every
# non-router node sets its IP and default route via per-node exec.

name: uupl-control
prefix: ""

topology:

  defaults:
    kind: linux
    # Strip clab's mgmt-network IP from eth0 on every node, so visitors
    # who type `hostname -I` see only the in-simulation address. clab's
    # own deploy/destroy uses docker exec and does not need eth0 to
    # have an IP. Failures are tolerated for kind:bridge nodes (which
    # do not have eth0) and netns-shared nodes.
    exec:
      - sh -c "ip addr flush dev eth0 2>/dev/null || true"

  nodes:

    # ── Zone bridges ────────────────────────────────────────────────────
    # The bridges are pre-created on the host by infrastructure/clab-up.sh
    # before the deploy. clab attaches container veths to them; lifecycle
    # of the bridges is managed by clab-up.sh / clab-down.sh, not clab.
    ics_control:     { kind: bridge }
    ics_operational: { kind: bridge }

    # ── L3 boundary ─────────────────────────────────────────────────────
    # FRR sets eth1 / eth2 IPs from frr.conf. iptables is loaded from
    # /acl.sh in start.sh. eth0 is clab's out-of-band mgmt NIC.
    ops-ctrl-fw:
      image: clab-router
      binds:
        - frr/daemons:/etc/frr/daemons
        - frr/ops-ctrl-fw.frr.conf:/etc/frr/frr.conf
        - ../infrastructure/routers/generated/ops-ctrl-fw-acl.sh:/acl.sh
      labels:
        role: gateway

    # ── Control-zone services ───────────────────────────────────────────
    uupl-mqtt:
      image: control-uupl-mqtt
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.60/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.3.203"

    hex-turbine-plc:
      image: control-hex-turbine-plc
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.21/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.3.203"

    # OPC-UA shares hex-turbine-plc's netns, OPC-UA on opc.tcp://10.10.3.21:4840.
    hex-turbine-opcua:
      image: control-hex-turbine-opcua
      network-mode: container:hex-turbine-plc

    uupl-relay-a:
      image: control-uupl-relay-a
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.31/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.3.203"

    uupl-relay-b:
      image: control-uupl-relay-b
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.32/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.3.203"

    uupl-meter:
      image: control-uupl-meter
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.33/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.3.203"

    uupl-fuel-valve:
      image: control-uupl-fuel-valve
      cap-add: [NET_ADMIN]
      env: { ACTUATOR_TYPE: valve }
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.51/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.3.203"

    uupl-cooling-pump:
      image: control-uupl-cooling-pump
      cap-add: [NET_ADMIN]
      env: { ACTUATOR_TYPE: pump }
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.52/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.3.203"

    uupl-breaker-a:
      image: control-uupl-breaker-a
      cap-add: [NET_ADMIN]
      env: { ACTUATOR_TYPE: breaker, FEEDER: "Dolly Sisters" }
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.53/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.3.203"

    uupl-breaker-b:
      image: control-uupl-breaker-b
      cap-add: [NET_ADMIN]
      env: { ACTUATOR_TYPE: breaker }
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.54/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.3.203"

    uupl-hmi:
      image: control-uupl-hmi
      env:
        PLC_IP: 10.10.3.21
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.10/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.3.203"

  # Per-topology prefix `vc*` for globally unique veth names.
  links:
    - endpoints: [ops-ctrl-fw:eth1, ics_control:vc0]
    - endpoints: [ops-ctrl-fw:eth2, ics_operational:vc1]

    - endpoints: [uupl-mqtt:eth1,      ics_control:vc2]
    - endpoints: [hex-turbine-plc:eth1,           ics_control:vc3]
    - endpoints: [uupl-relay-a:eth1,           ics_control:vc4]
    - endpoints: [uupl-relay-b:eth1,           ics_control:vc5]
    - endpoints: [uupl-meter:eth1,        ics_control:vc6]
    - endpoints: [uupl-fuel-valve:eth1,   ics_control:vc7]
    - endpoints: [uupl-cooling-pump:eth1, ics_control:vc8]
    - endpoints: [uupl-breaker-a:eth1,    ics_control:vc9]
    - endpoints: [uupl-breaker-b:eth1,    ics_control:vc10]
    - endpoints: [uupl-hmi:eth1,              ics_control:vc11]
