# UU P&L operational zone, structural clab edition.
#
# ics_operational (own), plus ics_control for the dual-homed
# uupl-modbus-gw / uupl-eng-ws, plus ics_wan for ops-wan-router.

name: uupl-operational
prefix: ""

topology:

  defaults:
    kind: linux
    # See clab/control-zone.clab.yaml for the why.
    exec:
      - sh -c "ip addr flush dev eth0 2>/dev/null || true"

  nodes:

    ics_operational: { kind: bridge }
    ics_control:     { kind: bridge }
    ics_wan:         { kind: bridge }

    # ── L3 boundary ─────────────────────────────────────────────────────
    ops-wan-router:
      image: clab-router
      binds:
        - frr/daemons:/etc/frr/daemons
        - frr/ops-wan-router.frr.conf:/etc/frr/frr.conf
        - ../infrastructure/routers/generated/ops-wan-router-acl.sh:/acl.sh
      labels:
        role: gateway

    # ── Operational services ────────────────────────────────────────────
    uupl-historian:
      image: operational-uupl-historian
      cap-add: [NET_ADMIN]
      env: { DATA_SOURCE: uupl_ied }
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.2.10/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.2.202"

    distribution-scada:
      image: operational-distribution-scada
      cap-add: [NET_ADMIN]
      binds:
        - ../certs/client.crt:/run/stunnel-certs/client.crt
        - ../certs/client.key:/run/stunnel-certs/client.key
        - ../certs/ca.crt:/run/stunnel-certs/ca.crt
      env:
        STUNNEL_GW_IP:  10.10.2.50
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.2.20/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.2.202"

    # uupl-modbus-gw dual-homed operational + control.
    uupl-modbus-gw:
      image: operational-uupl-modbus-gw
      cap-add: [NET_ADMIN]
      binds:
        - ../zones/control/components/uupl-modbus-gw/stunnel.conf:/run/stunnel/stunnel.conf:ro
        - ../certs/ca.crt:/run/stunnel/ca.crt:ro
        - ../certs/server.crt:/run/stunnel/server.crt:ro
        - ../certs/server.key:/run/stunnel/server.key:ro
      env: { FORWARD_TARGET: "10.10.3.21:502" }
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.2.50/24 dev eth1 && ip link set eth1 up"
        - sh -c "n=0; until ip link show eth2 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.50/24 dev eth2 && ip link set eth2 up"
        - sh -c "ip route replace default via 10.10.2.202"

    # uupl-eng-ws dual-homed operational + control.
    uupl-eng-ws:
      image: operational-uupl-eng-ws
      cap-add: [NET_ADMIN, NET_RAW]
      env:
        ICS_PROCESS:    uupl_ied
        CONTROL_SUBNET: 10.10.3.0/24
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.2.30/24 dev eth1 && ip link set eth1 up"
        - sh -c "n=0; until ip link show eth2 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.3.100/24 dev eth2 && ip link set eth2 up"
        - sh -c "ip route replace default via 10.10.2.202"

  # Per-topology prefix `vo*` for globally unique veth names.
  links:
    - endpoints: [ops-wan-router:eth1, ics_operational:vo0]
    - endpoints: [ops-wan-router:eth2, ics_wan:vo1]

    - endpoints: [uupl-historian:eth1,               ics_operational:vo2]
    - endpoints: [distribution-scada:eth1,            ics_operational:vo3]
    - endpoints: [uupl-modbus-gw:eth1,         ics_operational:vo5]
    - endpoints: [uupl-eng-ws:eth1, ics_operational:vo6]

    - endpoints: [uupl-modbus-gw:eth2,         ics_control:vo7]
    - endpoints: [uupl-eng-ws:eth2, ics_control:vo8]
