# UU P&L internet zone, structural clab edition.
#
# Three bridges: ics_internet (own), plus ics_enterprise and
# ics_operational for wizzards-retreat's triple-homing. inet-dmz-fw lives in
# clab/dmz-zone.clab.yaml; the visitor reaches it via the shared
# ics_internet bridge.

name: uupl-internet
prefix: ""

topology:

  defaults:
    kind: linux
    # See clab/control-zone.clab.yaml for the why: strip the mgmt-IP
    # from eth0 so hostname -I returns only in-simulation addresses.
    # unseen-gate has `network-mode: none` and therefore no eth0;
    # the `2>/dev/null || true` swallows the error there.
    exec:
      - sh -c "ip addr flush dev eth0 2>/dev/null || true"

  nodes:

    ics_internet:    { kind: bridge }
    ics_enterprise:  { kind: bridge }
    ics_operational: { kind: bridge }

    # External entry. `network-mode: none` strips the docker mgmt eth0
    # entirely; the only interface the visitor ever sees is eth1 at
    # 10.10.0.5. Host-side reachability for the SSH entrypoint is
    # plumbed via iptables NAT in infrastructure/clab-up.sh, not via
    # docker's port-publish.
    unseen-gate:
      image: internet-unseen-gate
      network-mode: none
      binds:
        - ../zones/internet/components/unseen-gate/adversary-keys:/run/adversary-keys:ro
        - ../zones/internet/components/unseen-gate/adversary-readme.txt:/run/adversary-readme.txt:ro
      cap-add: [NET_ADMIN, NET_RAW, SYS_ADMIN, SYS_PTRACE]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.0.5/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.0.200"

    # Triple-homed VPN simulator. eth1 = internet, eth2 = enterprise,
    # eth3 = operational. The dual VPN narrative is the dual NICs.
    wizzards-retreat:
      image: internet-wizzards-retreat
      cap-add: [NET_ADMIN, NET_RAW, SYS_ADMIN, SYS_PTRACE]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.0.10/24 dev eth1 && ip link set eth1 up"
        - sh -c "n=0; until ip link show eth2 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.1.3/24 dev eth2 && ip link set eth2 up"
        - sh -c "n=0; until ip link show eth3 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.10.2.3/24 dev eth3 && ip link set eth3 up"
        - sh -c "ip route replace default via 10.10.0.200"

  # Bridge-side endpoint names are host-namespace veth interface names,
  # so they need to be globally unique across all topologies. Convention:
  # per-topology prefix (`vi*` for internet-zone), sequential.
  links:
    - endpoints: [unseen-gate:eth1, ics_internet:vi0]
    - endpoints: [wizzards-retreat:eth1,       ics_internet:vi1]
    - endpoints: [wizzards-retreat:eth2,       ics_enterprise:vi2]
    - endpoints: [wizzards-retreat:eth3,       ics_operational:vi3]
