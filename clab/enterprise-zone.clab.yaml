# UU P&L enterprise zone, structural clab edition.
#
# ics_enterprise (own) plus ics_operational for ent-ops-fw and the
# dual-homed enterprise-workstation.

name: uupl-enterprise
prefix: ""

topology:

  defaults:
    kind: linux

  nodes:

    ics_enterprise:  { kind: bridge }
    ics_operational: { kind: bridge }

    # ── L3 boundary ─────────────────────────────────────────────────────
    ent-ops-fw:
      image: clab-router
      binds:
        - frr/daemons:/etc/frr/daemons
        - frr/ent-ops-fw.frr.conf:/etc/frr/frr.conf
        - ../infrastructure/routers/generated/ent-ops-fw-acl.sh:/acl.sh
      labels:
        role: gateway

    # ── Workstations ────────────────────────────────────────────────────
    legacy-workstation:
      image: enterprise-legacy-workstation
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "ip addr add 10.10.1.10/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 10.10.1.202"

    # bursar-desk, dual-homed enterprise + operational. eth1 = enterprise,
    # eth2 = operational.
    enterprise-workstation:
      image: enterprise-enterprise-workstation
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "ip addr add 10.10.1.20/24  dev eth1 && ip link set eth1 up"
        - sh -c "ip addr add 10.10.2.100/24 dev eth2 && ip link set eth2 up"
        - sh -c "ip route replace default via 10.10.1.202"

  # Per-topology prefix `ve*` for globally unique veth names.
  links:
    - endpoints: [ent-ops-fw:eth1, ics_enterprise:ve0]
    - endpoints: [ent-ops-fw:eth2, ics_operational:ve1]

    - endpoints: [legacy-workstation:eth1,     ics_enterprise:ve2]
    - endpoints: [enterprise-workstation:eth1, ics_enterprise:ve3]
    - endpoints: [enterprise-workstation:eth2, ics_operational:ve4]
